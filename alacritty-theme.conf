# Alacritty theme cloned for kitty
# Source: ~/.config/alacritty/alacritty.toml

# === Primary colors ===
foreground              #fffbf6
background              #101421

# === Normal colors ===
color0                  #2e2e2e
color1                  #eb4129
color2                  #abe047
color3                  #f6c744
color4                  #47a0f3
color5                  #7b5cb0
color6                  #64dbed
color7                  #e5e9f0

# === Bright colors ===
color8                  #565656
color9                  #ec5357
color10                 #c0e17d
color11                 #f9da6a
color12                 #49a4f8
color13                 #a47de9
color14                 #99faf2
color15                 #ffffff

# === Cursor (alacritty: Block, blinking On, interval 750ms) ===
cursor_shape            block
cursor_blink_interval   0.75

# === Window (alacritty: opacity 0.6, blur on, padding x=0 y=10) ===
background_opacity      0.6
background_blur         20
# kitty padding order: vertical (top/bottom), horizontal (left/right)
window_padding_width    10 0

# === Font (alacritty: JetBrainsMono Nerd Font Mono, size 17) ===
font_family             JetBrainsMono Nerd Font Mono
font_size               17.0

# === Scrollback (alacritty: history 5000) ===
scrollback_lines        5000

# === macOS option-as-alt (alacritty: OnlyLeft) ===
macos_option_as_alt     left
